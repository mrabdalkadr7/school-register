<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#0d9488"/>
  
  <!-- Body -->
  <ellipse cx="100" cy="115" rx="38" ry="26" fill="white"/>
  
  <!-- Wing left -->
  <ellipse cx="68" cy="108" rx="28" ry="13" fill="white" transform="rotate(-20 68 108)"/>
  
  <!-- Wing right -->
  <ellipse cx="132" cy="108" rx="28" ry="13" fill="white" transform="rotate(20 132 108)"/>
  
  <!-- Head -->
  <circle cx="100" cy="82" r="18" fill="white"/>
  
  <!-- Eye -->
  <circle cx="106" cy="79" r="4" fill="#0d9488"/>
  <circle cx="107" cy="78" r="1.5" fill="white"/>
  
  <!-- Beak -->
  <polygon points="118,80 128,83 118,86" fill="#f59e0b"/>
  
  <!-- Tail -->
  <ellipse cx="66" cy="125" rx="18" ry="7" fill="white" transform="rotate(30 66 125)"/>
  
  <!-- Feet -->
  <line x1="92" y1="138" x2="88" y2="150" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="88" y1="150" x2="82" y2="155" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <line x1="88" y1="150" x2="88" y2="157" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <line x1="88" y1="150" x2="94" y2="155" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  
  <line x1="108" y1="138" x2="112" y2="150" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="112" y1="150" x2="106" y2="155" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <line x1="112" y1="150" x2="112" y2="157" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <line x1="112" y1="150" x2="118" y2="155" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
</svg>
